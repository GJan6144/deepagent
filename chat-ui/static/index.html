<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Agents Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #ffffff;
            --bg-sidebar: #f9f9f9;
            --bg-hover: #ececec;
            --bg-active: #e3e3e3;
            --bg-input: #f0f0f0;
            --bg-user-bubble: #dceaff;
            --bg-ai-bubble: #f1f1f1;
            --bg-tool: #fff8e1;
            --text-primary: #1a1a1a;
            --text-secondary: #8e8e8e;
            --text-muted: #b0b0b0;
            --text-user-bubble: #1a1a1a;
            --text-tool: #b8860b;
            --border: #e5e5e5;
            --accent: #4d6bfe;
            --accent-hover: #3b56d4;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-size: 15px;
            line-height: 1.6;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
            overflow: hidden;
        }
        .sidebar.collapsed { margin-left: -280px; }

        .sidebar-header { padding: 16px; }
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .logo svg { width: 24px; height: 24px; }

        .new-chat-btn {
            margin: 8px 12px 12px; padding: 12px 16px; background: var(--accent); color: white;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s;
        }
        .new-chat-btn:hover { background: var(--accent-hover); }

        .session-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .session-list::-webkit-scrollbar { width: 6px; }
        .session-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        .session-item { padding: 12px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; transition: background 0.15s; }
        .session-item:hover { background: var(--bg-hover); }
        .session-item.active { background: var(--bg-active); }
        .session-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
        .model-badge { background: var(--bg-hover); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--accent); }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); min-width: 0; }
        .chat-header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; min-height: 56px; }
        .chat-title { font-size: 16px; font-weight: 600; flex: 1; }
        .menu-toggle { display: flex; align-items: center; gap: 4px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-secondary); padding: 4px 6px; border-radius: 6px; transition: background 0.15s; }
        .menu-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .menu-toggle svg { width: 18px; height: 18px; }

        .messages-container { flex: 1; overflow-y: auto; padding: 24px 0; }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .message-row { max-width: 800px; margin: 0 auto 20px; padding: 0 24px; display: flex; gap: 10px; }
        .message-row.user { flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
        .avatar.ai { background: var(--accent); color: white; }
        .avatar.user { background: #c5d8ff; color: #185fa5; }
        .bubble-wrap { max-width: 70%; min-width: 0; }
        .bubble { padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.7; word-wrap: break-word; }
        .bubble.ai { background: var(--bg-ai-bubble); color: var(--text-primary); border-top-left-radius: 4px; }
        .bubble.user { background: var(--bg-user-bubble); color: var(--text-user-bubble); border-top-right-radius: 4px; }
        .bubble p { margin-bottom: 8px; } .bubble p:last-child { margin-bottom: 0; }
        .bubble pre { background: #1e1e2e; color: #cdd6f4; padding: 14px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
        .bubble code { background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'Fira Code', monospace; }
        .bubble.user code { background: rgba(0,0,0,0.08); }
        .bubble pre code { background: none; padding: 0; }
        .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 8px; }
        .bubble li { margin-bottom: 4px; }

        .tool-indicator { max-width: 800px; margin: -12px auto 20px; padding: 0 24px 0 70px; }
        .tool-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-tool); color: var(--text-tool); padding: 6px 12px; border-radius: 8px; font-size: 12px; }

        .typing-indicator { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }

        .welcome-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .welcome-logo { font-size: 36px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
        .welcome-subtitle { font-size: 16px; color: var(--text-secondary); margin-bottom: 40px; }
        .welcome-suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 600px; width: 100%; }
        .suggestion-card { padding: 16px 20px; border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .suggestion-card:hover { border-color: var(--accent); background: var(--bg-ai-bubble); }
        .suggestion-title { font-weight: 600; margin-bottom: 4px; }
        .suggestion-desc { font-size: 13px; color: var(--text-secondary); }

        .input-area { padding: 16px 24px 20px; }
        .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 4px; background: var(--bg-input); border-radius: 16px; padding: 12px 12px 8px 20px; border: 1px solid transparent; transition: border-color 0.2s; }
        .input-wrapper:focus-within { border-color: var(--accent); }
        .chat-input { width: 100%; border: none; background: none; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 200px; min-height: 24px; line-height: 1.6; padding: 4px 0; }
        .input-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .toolbar-left { display: flex; gap: 6px; }
        .feature-toggle { display: inline-flex; align-items: center; gap: 4px; background: none; border: 0.5px solid var(--border); border-radius: 16px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .feature-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
        .feature-toggle.active { background: rgba(77, 107, 254, 0.08); border-color: var(--accent); color: var(--accent); }
        .feature-toggle svg { width: 12px; height: 12px; }
        .send-btn { width: 36px; height: 36px; border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .send-btn.send { background: var(--accent); }
        .send-btn.send:hover { background: var(--accent-hover); }
        .send-btn.stop { background: #e44; }
        .send-btn.stop:hover { background: #c33; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .send-btn svg { width: 18px; height: 18px; }

        /* --- Message actions (Copy, Refresh, Like, Dislike) --- */
        .msg-actions { display: flex; gap: 4px; margin-top: 6px; opacity: 0; transition: opacity 0.2s; }
        .bubble-wrap:hover .msg-actions { opacity: 1; }
        .msg-actions.right { justify-content: flex-end; }
        .msg-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 12px; transition: all 0.15s; }
        .msg-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .msg-btn.active { color: var(--accent); }
        .msg-btn svg { width: 14px; height: 14px; }
        .msg-btn.copied { color: #1d9e75; }

        /* --- Thinking display --- */
        .thinking-block { max-width: 800px; margin: 0 auto 12px; padding: 0 24px 0 70px; }
        .thinking-header { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 12px; cursor: pointer; user-select: none; padding: 4px 0; }
        .thinking-header:hover { color: var(--text-primary); }
        .thinking-icon { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; }
        .thinking-toggle { margin-left: auto; transition: transform 0.2s; }
        .thinking-toggle.open { transform: rotate(180deg); }
        .thinking-content { background: #f7f7f5; border: 0.5px solid #e5e5e0; border-radius: 8px; padding: 12px 14px; margin-top: 6px; font-size: 13px; line-height: 1.6; color: #6b6b6b; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .thinking-content.collapsed { display: none; }

        /* --- Session item menu button (3-dot) --- */
        .session-item .session-menu { opacity: 0; background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 4px; flex-shrink: 0; transition: opacity 0.15s; }
        .session-item:hover .session-menu { opacity: 1; }
        .session-menu:hover { background: var(--bg-hover); color: var(--text-primary); }
        .session-pinned { color: var(--accent); }
        .session-section-header { font-size: 11px; font-weight: 500; color: #e44; padding: 14px 14px 4px; letter-spacing: 0.3px; }
        .session-rename-input { flex: 1; padding: 4px 8px; border: 1.5px solid var(--accent); border-radius: 4px; font-size: 14px; font-family: inherit; outline: none; background: white; }

        /* --- Context menu --- */
        .context-menu { position: fixed; background: white; border: 0.5px solid var(--border); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 4px; z-index: 300; min-width: 140px; }
        .context-menu-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--text-primary); background: none; border: none; width: 100%; text-align: left; }
        .context-menu-item:hover { background: var(--bg-hover); }
        .context-menu-item.danger { color: #e44; }
        .context-menu-item.danger:hover { background: rgba(228,68,68,0.1); }
        .context-menu-item svg { width: 14px; height: 14px; }
        .context-menu-divider { height: 0.5px; background: var(--border); margin: 4px 0; }

        /* --- Modals (rename, delete confirm) --- */
        .center-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 400; display: none; align-items: center; justify-content: center; }
        .center-modal.show { display: flex; }
        .center-modal .modal-box { background: white; border-radius: 12px; padding: 24px; min-width: 360px; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.16); }
        .center-modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .center-modal p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
        .center-modal input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; }
        .center-modal input:focus { border-color: var(--accent); }
        .center-modal .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .center-modal button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit; }
        .center-modal .btn-cancel { background: transparent; color: var(--text-primary); border: 0.5px solid var(--border); }
        .center-modal .btn-cancel:hover { background: var(--bg-hover); }
        .center-modal .btn-confirm { background: var(--accent); color: white; }
        .center-modal .btn-confirm:hover { background: var(--accent-hover); }
        .center-modal .btn-danger { background: #e44; color: white; }
        .center-modal .btn-danger:hover { background: #c33; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 100; margin-left: 0; }
            .sidebar.collapsed { margin-left: -280px; }
            .menu-toggle { display: block; }
            .welcome-suggestions { grid-template-columns: 1fr; }
            .bubble-wrap { max-width: 85%; }
            .thinking-block { padding-left: 24px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                Deep Agents
            </div>
        </div>
        <button class="new-chat-btn" onclick="createSession()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Chat
        </button>
        <div class="session-list" id="sessionList"></div>
        <div class="sidebar-footer">
            <span class="model-badge">deepseek-v4-flash</span>
            <span style="font-size:11px;color:var(--text-muted); margin-left:6px">Local</span>
        </div>
    </aside>

    <main class="chat-area">
        <div class="chat-header">
            <button class="menu-toggle" onclick="toggleSidebar()" title="收缩侧边栏">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="chat-title" id="chatTitle">Deep Agents Chat</div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Send a message..." rows="1"
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <div class="input-toolbar">
                    <div class="toolbar-left">
                        <button class="feature-toggle" id="searchToggle" onclick="toggleSearch()" title="启用/关闭联网搜索">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <span>智能搜索</span>
                        </button>
                    </div>
                    <button class="send-btn send" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentSessionId = null;
        let isStreaming = false;
        let abortController = null;
        let currentEmpty = false;  // whether the current session has no messages
        let useSearch = false;     // 联网搜索开关（默认关闭）

        window.onload = function() { showWelcome(); loadSessions(); };

        async function loadSessions() {
            const res = await fetch('/api/sessions');
            const sessions = await res.json();
            const list = document.getElementById('sessionList');
            list.innerHTML = '';

            // Group sessions by category
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const sevenDaysAgo = new Date(todayStart.getTime() - 7 * 86400000);
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const currentDay = now.getDate();

            const pinnedList = [];
            const todayList = [];
            const sevenDayList = [];
            const thirtyDayList = [];
            const olderMap = {};

            for (const s of sessions) {
                const d = new Date(s.updated_at);
                if (s.pinned) { pinnedList.push(s); continue; }
                if (d >= todayStart) { todayList.push(s); continue; }
                if (d >= sevenDaysAgo) { sevenDayList.push(s); continue; }
                if (d >= monthStart) { thirtyDayList.push(s); continue; }
                const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                if (!olderMap[key]) olderMap[key] = { date: d, sessions: [] };
                olderMap[key].sessions.push(s);
            }

            const makeItem = (s) => {
                const item = document.createElement('div');
                item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                item.dataset.id = s.id;
                item.dataset.title = s.title;
                item.dataset.pinned = s.pinned ? '1' : '0';
                const pinIcon = s.pinned ? '&#9733;' : '&#8943;';
                item.innerHTML = `
                    <span class="session-title" data-raw="${escapeAttr(s.title)}">${escapeHtml(s.title)}${s.pinned ? ' <span class="session-pinned" title="Pinned">&#9733;</span>' : ''}</span>
                    <button class="session-menu" onclick="showContextMenu(event, '${s.id}', '${escapeAttr(s.title)}', ${!!s.pinned})" title="More">${pinIcon}</button>`;
                item.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, s.id, s.title, s.pinned); };
                item.onclick = (e) => { if (!e.target.closest('.session-menu, .session-rename-input')) selectSession(s.id); };
                return item;
            };

            const makeSection = (title, ss) => {
                if (!ss.length) return;
                const h = document.createElement('div');
                h.className = 'session-section-header';
                h.textContent = title;
                list.appendChild(h);
                for (const s of ss) list.appendChild(makeItem(s));
            };

            makeSection('置顶', pinnedList);
            makeSection('今天', todayList);
            makeSection('7 天内', sevenDayList);
            if (currentDay >= 7) makeSection('30 天内', thirtyDayList);

            // Older year-month groups, max 12 months, descending
            const monthKeys = Object.keys(olderMap).sort().reverse().slice(0, 12);
            for (const k of monthKeys) {
                const d = olderMap[k].date;
                const label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
                makeSection(label, olderMap[k].sessions);
            }
        }

        // Show context menu (right-click or 3-dot click) on session item
        function showContextMenu(event, id, title, pinned) {
            event.stopPropagation();
            event.preventDefault();
            // Remove any existing menu
            const existing = document.getElementById('contextMenu');
            if (existing) existing.remove();

            const menu = document.createElement('div');
            menu.id = 'contextMenu';
            menu.className = 'context-menu';
            menu.style.left = event.clientX + 'px';
            menu.style.top = event.clientY + 'px';
            const pinLabel = pinned ? '取消置顶' : '置顶';
            menu.innerHTML = `
                <button class="context-menu-item" onclick="renameSession('${id}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    重命名
                </button>
                <button class="context-menu-item" onclick="pinSession('${id}', ${!pinned})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    ${pinLabel}
                </button>
                <div class="context-menu-divider"></div>
                <button class="context-menu-item danger" onclick="showDeleteConfirm('${id}', '${escapeAttr(title)}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    删除
                </button>`;
            document.body.appendChild(menu);

            // Close on click outside
            setTimeout(() => {
                const close = (e) => {
                    if (!menu.contains(e.target)) {
                        menu.remove();
                        document.removeEventListener('click', close);
                    }
                };
                document.addEventListener('click', close);
            }, 0);
        }

        async function renameSession(id) {
            const item = document.querySelector(`.session-item[data-id="${id}"]`);
            if (!item) return;
            const titleSpan = item.querySelector('.session-title');
            const currentTitle = item.dataset.title;
            // Replace span with input
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'session-rename-input';
            input.value = currentTitle;
            titleSpan.replaceWith(input);
            input.focus();
            input.select();

            // Close any context menu
            document.querySelectorAll('.context-menu').forEach(m => m.remove());

            let done = false;
            const finish = async (save) => {
                if (done) return;
                done = true;
                const newTitle = input.value.trim();
                if (save && newTitle && newTitle !== currentTitle) {
                    await fetch(`/api/sessions/${id}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title: newTitle}) });
                    if (currentSessionId === id) document.getElementById('chatTitle').textContent = newTitle;
                }
                await loadSessions();
            };

            input.addEventListener('blur', () => finish(true));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { e.preventDefault(); finish(false); }
            });
        }

        async function pinSession(id, newPinned) {
            await fetch(`/api/sessions/${id}/pin`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pinned: newPinned}) });
            // Close any open context menu
            document.querySelectorAll('.context-menu').forEach(m => m.remove());
            await loadSessions();
        }

        function showDeleteConfirm(id, title) {
            const modal = document.getElementById('deleteModal');
            document.getElementById('deleteModalTitle').textContent = title;
            modal.dataset.targetId = id;
            modal.classList.add('show');
        }

        function closeDeleteConfirm() {
            document.getElementById('deleteModal').classList.remove('show');
        }

        async function confirmDeleteSession() {
            const id = document.getElementById('deleteModal').dataset.targetId;
            if (!id) return;
            await fetch(`/api/sessions/${id}`, {method: 'DELETE'});
            if (currentSessionId === id) {
                currentSessionId = null;
                currentEmpty = true;
                document.getElementById('chatTitle').textContent = 'Deep Agents Chat';
                document.getElementById('messagesContainer').innerHTML = '';
                showWelcome();
            }
            closeDeleteConfirm();
            await loadSessions();
        }

        async function createSession(forceNew = false) {
            // Empty session protection: if current session has no messages and not forced, just focus the input
            if (!forceNew && currentSessionId && currentEmpty) {
                document.getElementById('chatInput').focus();
                return;
            }
            const res = await fetch('/api/sessions', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title: 'New Chat'}) });
            const session = await res.json();
            currentSessionId = session.id;
            currentEmpty = true;
            document.getElementById('chatTitle').textContent = session.title;
            showWelcome();
            await loadSessions();
            document.getElementById('chatInput').focus();
        }


        async function selectSession(id) {
            currentSessionId = id;
            const [msgRes, sessRes, fbRes] = await Promise.all([
                fetch(`/api/sessions/${id}/messages`),
                fetch('/api/sessions'),
                fetch(`/api/feedback/${id}`),
            ]);
            const messages = await msgRes.json();
            currentEmpty = messages.length === 0;
            const sessions = await sessRes.json();
            const feedbackList = await fbRes.json();
            const fbMap = {};
            feedbackList.forEach(f => fbMap[f.message_id] = f.rating);
            const session = sessions.find(s => s.id === id);
            document.getElementById('chatTitle').textContent = session ? session.title : 'Chat';
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            if (messages.length === 0) showWelcome();
            else {
                messages.forEach(m => {
                    if (m.role === 'thinking') {
                        // Reconstruct thinking block
                        const tb = document.createElement('div');
                        tb.className = 'thinking-block';
                        tb.innerHTML = `
                            <div class="thinking-header" onclick="this.parentElement.querySelector('.thinking-content').classList.toggle('collapsed'); this.querySelector('.thinking-toggle').classList.toggle('open');">
                                <span class="thinking-icon">&#9776;</span>
                                <span>Thinking</span>
                                <span class="thinking-toggle">&#9662;</span>
                            </div>
                            <div class="thinking-content collapsed">${escapeHtml(m.content)}</div>`;
                        container.appendChild(tb);
                        return;
                    }
                    const obj = appendMessage(m.role, m.content, m.id);
                    if (m.role === 'assistant') {
                        const rating = fbMap[m.id];
                        if (rating === 'like') obj.actions.querySelector('.like-btn')?.classList.add('active');
                        if (rating === 'dislike') obj.actions.querySelector('.dislike-btn')?.classList.add('active');
                    }
                });
            }
            await loadSessions();
            scrollToBottom();
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                if (event.altKey || event.shiftKey) {
                    // Alt+Enter or Shift+Enter: insert newline
                    return;
                }
                event.preventDefault();
                sendMessage();
            }
        }
        function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px'; }

        function stopGeneration() {
            if (abortController) {
                abortController.abort();
                abortController = null;
            }
        }

        function toggleSearch() {
            useSearch = !useSearch;
            const btn = document.getElementById('searchToggle');
            btn.classList.toggle('active', useSearch);
        }

        function setButtonMode(mode) {
            const btn = document.getElementById('sendBtn');
            btn.className = 'send-btn ' + mode;
            if (mode === 'send') {
                btn.disabled = isStreaming;
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
                btn.onclick = sendMessage;
            } else {
                btn.disabled = false;
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';
                btn.onclick = stopGeneration;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content || isStreaming) return;
            if (!currentSessionId) await createSession();
            const welcome = document.getElementById('welcomeScreen');
            if (welcome) welcome.remove();
            currentEmpty = false;

            appendMessage('user', content);
            input.value = ''; autoResize(input);

            const aiObj = appendMessage('assistant', '');
            const aiRow = aiObj.row;
            const aiActions = aiObj.actions;
            const bubble = aiRow.querySelector('.bubble');
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

            isStreaming = true;
            setButtonMode('stop');
            let toolIndicator = null;
            let thinkingBlock = null;
            let thinkingContent = null;
            abortController = new AbortController();
            const signal = abortController.signal;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: currentSessionId, content, use_search: useSearch}),
                    signal: signal,
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '', fullText = '';
                bubble.innerHTML = '';

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value);
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.token) { fullText += data.token; bubble.innerHTML = renderMarkdown(fullText); scrollToBottom(); }
                            if (data.thinking) {
                                if (!thinkingBlock) {
                                    thinkingBlock = document.createElement('div');
                                    thinkingBlock.className = 'thinking-block';
                                    thinkingBlock.innerHTML = `
                                        <div class="thinking-header" onclick="this.parentElement.querySelector('.thinking-content').classList.toggle('collapsed'); this.querySelector('.thinking-toggle').classList.toggle('open');">
                                            <span class="thinking-icon">&#9776;</span>
                                            <span>Thinking</span>
                                            <span class="thinking-toggle">&#9662;</span>
                                        </div>
                                        <div class="thinking-content"></div>`;
                                    aiRow.parentNode.insertBefore(thinkingBlock, aiRow);
                                    thinkingContent = thinkingBlock.querySelector('.thinking-content');
                                }
                                thinkingContent.textContent += data.thinking;
                                scrollToBottom();
                            }
                            if (data.error) { bubble.innerHTML = '<span style="color:#e44">Error: ' + escapeHtml(data.error) + '</span>'; }
                            if (data.status === 'tool_start') {
                                if (!toolIndicator) {
                                    toolIndicator = document.createElement('div');
                                    toolIndicator.className = 'tool-indicator';
                                    aiRow.parentNode.insertBefore(toolIndicator, aiRow.nextSibling);
                                }
                                toolIndicator.innerHTML = '<span class="tool-badge">&#9881; Using ' + escapeHtml(data.name || 'tool') + '...</span>';
                            }
                            if (data.status === 'tool_end' && toolIndicator) {
                                toolIndicator.remove();
                                toolIndicator = null;
                            }
                            if (data.done && data.message_id) {
                                // Update like/dislike buttons with real message id
                                aiActions.querySelectorAll('.like-btn, .dislike-btn').forEach(btn => {
                                    btn.dataset.mid = data.message_id;
                                });
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    bubble.innerHTML = '<em style="color:var(--text-secondary)">Generation stopped</em>';
                } else {
                    bubble.innerHTML = '<span style="color:#e44">Error: ' + escapeHtml(err.message) + '</span>';
                }
            }
            isStreaming = false;
            abortController = null;
            setButtonMode('send');
            await loadSessions();
        }

        function useSuggestion(text) { const input = document.getElementById('chatInput'); input.value = text; input.focus(); autoResize(input); }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.querySelector('.menu-toggle');
            sidebar.classList.toggle('collapsed');
            const collapsed = sidebar.classList.contains('collapsed');
            btn.title = collapsed ? '展开侧边栏' : '收缩侧边栏';
            btn.innerHTML = collapsed
                ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="18" x2="15" y2="12"/><line x1="9" y1="6" x2="15" y2="12"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
        }

        function showWelcome() {
            document.getElementById('messagesContainer').innerHTML = `
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">Deep Agents</div>
                    <div class="welcome-suggestions">
                        <div class="suggestion-card" onclick="useSuggestion('List files in the project, then summarize the structure')">
                            <div class="suggestion-title">Explore Project</div>
                            <div class="suggestion-desc">List and analyze files via shell</div>
                        </div>
                        <div class="suggestion-card" onclick="useSuggestion('Run git status and show me the current branch')">
                            <div class="suggestion-title">Git Status</div>
                            <div class="suggestion-desc">Run git commands via execute</div>
                        </div>
                        <div class="suggestion-card" onclick="useSuggestion('My name is GJan, please remember me in AGENTS.md')">
                            <div class="suggestion-title">Tell Your Name</div>
                            <div class="suggestion-desc">Framework will remember via AGENTS.md</div>
                        </div>
                        <div class="suggestion-card" onclick="useSuggestion('Create a Python script that prints Hello World and run it')">
                            <div class="suggestion-title">Write + Run Code</div>
                            <div class="suggestion-desc">Create file, execute it, check output</div>
                        </div>
                    </div>
                </div>`;
        }

        function appendMessage(role, content, msgId = null) {
            const container = document.getElementById('messagesContainer');
            const isUser = role === 'user';
            const row = document.createElement('div');
            row.className = 'message-row ' + role;
            const mid = msgId || ('temp_' + Date.now() + '_' + Math.random().toString(36).slice(2,8));
            row.innerHTML = `
                <div class="avatar ${role}">${isUser ? 'You' : 'Deep Agents'}</div>
                <div class="bubble-wrap">
                    <div class="bubble ${role}">${content ? renderMarkdown(content) : ''}</div>
                    <div class="msg-actions ${isUser ? 'right' : ''}"></div>
                </div>`;
            container.appendChild(row);
            const actions = row.querySelector('.msg-actions');
            if (msgId) messageIdMap[row] = msgId;

            if (isUser) {
                actions.innerHTML = `
                    <button class="msg-btn" onclick="copyMessage(this, event)" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    </button>`;
            } else {
                actions.innerHTML = `
                    <button class="msg-btn" onclick="copyMessage(this, event)" title="Copy">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 012-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    </button>
                    <button class="msg-btn" onclick="regenerateMessage(this, event)" title="Regenerate">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    </button>
                    <button class="msg-btn like-btn" data-mid="${mid}" onclick="rateMessage(this, 'like', event)" title="Like">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
                    </button>
                    <button class="msg-btn dislike-btn" data-mid="${mid}" onclick="rateMessage(this, 'dislike', event)" title="Dislike">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3zm7-13h2.67A2.31 2.31 0 0122 4v7a2.31 2.31 0 01-2.33 2H17"/></svg>
                    </button>`;
            }
            scrollToBottom();
            return { row, actions };
        }

        function getBubbleText(row) {
            const bubble = row.querySelector('.bubble');
            return bubble ? bubble.innerText : '';
        }

        async function copyMessage(btn, event) {
            event.stopPropagation();
            const row = btn.closest('.message-row');
            // Use innerText which gives the rendered plain text from HTML
            const text = getBubbleText(row);
            try {
                await navigator.clipboard.writeText(text);
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            } catch (e) {
                // Fallback for non-HTTPS or unsupported environments
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    btn.classList.add('copied');
                    setTimeout(() => btn.classList.remove('copied'), 1500);
                } catch (e2) {
                    alert('Copy failed: ' + e2.message);
                }
                document.body.removeChild(ta);
            }
        }

        async function rateMessage(btn, rating, event) {
            event.stopPropagation();
            const actions = btn.closest('.msg-actions');
            const mid = btn.dataset.mid;
            if (!mid || mid.startsWith('temp_')) {
                alert('Cannot rate: message not yet saved');
                return;
            }
            const likeBtn = actions.querySelector('.like-btn');
            const dislikeBtn = actions.querySelector('.dislike-btn');
            const wasActive = btn.classList.contains('active');
            // Toggle off if clicking same button
            const newRating = wasActive ? null : rating;
            try {
                if (newRating) {
                    await fetch('/api/feedback', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message_id: mid, session_id: currentSessionId, rating: newRating}) });
                } else {
                    // Delete existing feedback (use the rating route)
                    await fetch(`/api/feedback/${mid}`, { method: 'DELETE' });
                }
                likeBtn.classList.toggle('active', newRating === 'like');
                dislikeBtn.classList.toggle('active', newRating === 'dislike');
            } catch (e) {
                alert('Failed to record feedback');
            }
        }

        async function regenerateMessage(btn, event) {
            event.stopPropagation();
            // Get the user message before this AI message
            const actions = btn.closest('.msg-actions');
            const aiRow = actions.previousElementSibling;
            // Find the previous user message
            let prev = aiRow ? aiRow.previousElementSibling : null;
            while (prev && !prev.classList.contains('user')) prev = prev.previousElementSibling;
            if (!prev) { alert('No previous user message to regenerate from'); return; }
            const userText = getBubbleText(prev);
            // Remove the AI response
            aiRow.remove();
            actions.remove();
            // Re-send
            document.getElementById('chatInput').value = userText;
            await sendMessage();
        }

        function scrollToBottom() { const c = document.getElementById('messagesContainer'); c.scrollTop = c.scrollHeight; }

        function renderMarkdown(text) {
            let html = escapeHtml(text);
            // Code blocks first (before any other replacements)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => '<pre><code>' + code.trim() + '</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Bold: only if **...** pair is balanced and has content
            html = html.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
            // Italic: only if *...* pair is balanced
            html = html.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
            // Escape leftover stray asterisks that didn't form a pair
            html = html.replace(/\*+/g, '');
            // Headings
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            // Lists
            html = html.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
            html = html.replace(/^[-*]\s(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/gs, (m) => '<ul>' + m + '</ul>');
            // Paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p>(<(pre|h[1-3]|ul|li))/g, '$1');
            html = html.replace(/(<\/pre>|<\/h[1-3]>|<\/ul>)<\/p>/g, '$1');
            return html;
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function escapeAttr(text) { return String(text).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    </script>
    <!-- Delete confirmation modal -->
    <div class="center-modal" id="deleteModal">
        <div class="modal-box">
            <h3 id="deleteModalTitle">删除后，该对话将不可恢复</h3>
            <p>删除后不可恢复，确认删除此会话吗？</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeDeleteConfirm()">取消</button>
                <button class="btn-danger" onclick="confirmDeleteSession()">删除该对话</button>
            </div>
        </div>
    </div>
</body>
